name: WG Easy 15+
version: "15.2.2"
upstream: 15.2.2
slug: wgeasy15plus
description: >-
  WireGuard Easy 15+: WireGuard + UI in one
arch:
  - amd64
  - aarch64
url: "https://github.com/jdeath/homeassistant-addons"
ports:
  51820/udp: "51820" 
  51821/tcp: "51821" 
ports_description:
  51820/udp: "51820"   
  51821/tcp: "WireGuard: forward this port in your router"
map:
  - type: addon_config
    read_only: false
    path: /etc/wireguard
environment:
  INSECURE: "true" 
boot: auto
startup: services
ingress: true
ingress_port: 8099
panel_icon: mdi:shield-lock
panel_title: WireGuard
webui: http://[HOST]:[PORT:51821]
privileged:
  - "NET_ADMIN"
devices:
  - "/dev/net/tun"
