worker_processes 1;
pid /var/run/nginx.pid;
error_log /proc/1/fd/1 info;
daemon off;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    access_log   /proc/1/fd/1 combined;

    map $http_x_ingress_path $ingress_path {
        default '';
        ~^(.+)$ $1;
    }

    server {
        listen %%port%%;

        location / {
            proxy_pass         http://127.0.0.1:7745;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_read_timeout 86400;
            proxy_set_header   Accept-Encoding   '';

            sub_filter_once    off;
            sub_filter_types   text/html;

            # Rewrite absolute paths in HTML so browser loads assets through ingress
            sub_filter 'src="/' 'src="$ingress_path/';
            sub_filter 'href="/' 'href="$ingress_path/';

            # Inject before </head>: patches Nuxt config, overrides fetch/XHR,
            # and normalizes location.pathname so Nuxt router sees clean paths
            sub_filter '</head>' '<script>var _hb="$ingress_path";(function(){if(_hb){var c=window.__NUXT__;if(c&&c.config){c.config.app.baseURL=_hb}var _f=window.fetch;window.fetch=function(u,p){if(typeof u==="string"&&u.charAt(0)==="/"&&_hb){u=_hb+u}return _f.apply(this,arguments)};var _o=window.XMLHttpRequest.prototype.open;window.XMLHttpRequest.prototype.open=function(m,u){if(typeof u==="string"&&u.charAt(0)==="/"&&_hb){arguments[1]=_hb+u}return _o.apply(this,arguments)};history.replaceState(null,"",location.pathname.substring(_hb.length))}})()</script></head>';
        }
    }
}
