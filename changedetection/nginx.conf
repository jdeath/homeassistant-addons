worker_processes 1;
pid /var/run/nginx.pid;
error_log /proc/1/fd/1 warn;
daemon off;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    access_log   /proc/1/fd/1 combined;

    # When there is no ingress header (direct port access), use an empty prefix
    # so the sub_filter replacements below become no-ops.
    map $http_x_ingress_path $ingress_path {
        default "";
        ~^(.+)$ $1;
    }

    server {
        listen %%port%%;

        location / {
            proxy_pass         http://127.0.0.1:5001;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 86400;

            # Prevent upstream from sending gzip so sub_filter can read the body
            proxy_set_header   Accept-Encoding   "";

            # Rewrite absolute paths in responses to include the HA ingress prefix
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;
            sub_filter 'href="/'    'href="$ingress_path/';
            sub_filter 'src="/'     'src="$ingress_path/';
            sub_filter 'action="/'  'action="$ingress_path/';
            sub_filter "url('/"     "url('$ingress_path/";
            sub_filter 'url("/'     'url("$ingress_path/';
        }
    }
}
