worker_processes 1;
error_log /dev/stderr notice;
pid /tmp/nginx-ingress.pid;

events {
    worker_connections 512;
}

http {
    access_log /dev/stdout;

    server {
        listen 8099;

        location / {
            set $ingress_path $http_x_ingress_path;

            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 90;

            # Disable response compression so sub_filter can rewrite HTML
            proxy_set_header Accept-Encoding "";

            # Rewrite absolute asset paths in HTML using the HA ingress path prefix.
            # Vite/Vue SPAs emit src="/assets/..." and href="/assets/..." which the
            # browser resolves against the HA host, breaking asset loads.
            sub_filter_types text/html;
            sub_filter_once off;
            sub_filter 'src="/'  'src="$ingress_path/';
            sub_filter 'href="/' 'href="$ingress_path/';
        }
    }
}
