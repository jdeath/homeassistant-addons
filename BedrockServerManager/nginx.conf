worker_processes 1;
pid /var/run/nginx.pid;
error_log /proc/1/fd/1 info;
daemon off;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    access_log   /proc/1/fd/1 combined;

    map $http_x_ingress_path $ingress_path {
        default "";
        ~^(.+)$ $1;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    server {
        listen %%port%%;
        absolute_redirect off;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 512k;

        # WebSocket endpoint.
        # Nginx does NOT support WebSocket permessage-deflate. If the browser
        # requests it, nginx can't proxy compressed frames to the upstream app.
        # We strip the Sec-WebSocket-Extensions header so the app never
        # negotiates permessage-deflate for proxied connections.
        location /ws {
            proxy_pass              http://127.0.0.1:11325;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade           $http_upgrade;
            proxy_set_header        Connection        $connection_upgrade;
            proxy_set_header        Host              $http_host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            # Strip permessage-deflate - nginx can't proxy compressed WS frames
            proxy_set_header        Sec-WebSocket-Extensions '';
            proxy_read_timeout      86400;
            proxy_send_timeout      86400;
        }

        # All other traffic
        location / {
            proxy_pass         http://127.0.0.1:11325;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 86400;

            # Prevent upstream from sending gzip so sub_filter can read the body
            proxy_set_header   Accept-Encoding   "";

            # Strip cache headers so browser always re-fetches (sub_filter rewrites).
            proxy_ignore_headers Cache-Control Expires;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # Rewrite Location header on redirects.
            proxy_redirect     /app   $ingress_path/app;
            proxy_redirect     /api   $ingress_path/api;
            proxy_redirect     /auth  $ingress_path/auth;
            proxy_redirect     /image $ingress_path/image;

            sub_filter_once    off;
            sub_filter_types   text/html text/css application/javascript;

            # Inject WebSocket path fix into HTML <head>.
            # Monkey-patches the WebSocket constructor to prepend the ingress path.
            sub_filter '</head>' '<script>window.__INGRESS_PATH__="$ingress_path";if(window.__INGRESS_PATH__){var _ws=WebSocket;WebSocket=function(u){var m=u.match(/^(wss?:\/\/[^\/]+)(\/[^?]*)/);if(m){u=m[1]+window.__INGRESS_PATH__+m[2]};return new _ws(u)};WebSocket.prototype=_ws.prototype}</script></head>';

            # Rewrite absolute paths for ingress.
            sub_filter '/app' '$ingress_path/app';
            sub_filter '/api' '$ingress_path/api';
            sub_filter '/auth' '$ingress_path/auth';
            sub_filter 'href="/image' 'href="$ingress_path/image';
            sub_filter 'src="/image'  'src="$ingress_path/image';
            sub_filter "url('/image"  "url('$ingress_path/image";
            sub_filter 'url("/image'  'url("$ingress_path/image';
            sub_filter 'url(/image'   'url($ingress_path/image';
            sub_filter '"/image/'     '"$ingress_path/image/';
            sub_filter "'/image/"     "'$ingress_path/image/";
            sub_filter '"/image"'     '"$ingress_path/image"';
            sub_filter "'/image'"     "'$ingress_path/image'";
            sub_filter 'href="image/' 'href="$ingress_path/image/';
        }
    }
}
